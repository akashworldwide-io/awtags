<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWTags</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0f0a19;
color:white;
min-height:100vh;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.badge{
display:inline-block;
padding:10px 20px;
border-radius:999px;
text-decoration:none;
font-weight:bold;
background:linear-gradient(90deg,#7c3aed,#a855f7);
color:white;
}

.logo{
text-align:center;
font-size:60px;
font-weight:bold;
color:#c084fc;
margin-top:20px;
}

.subtitle{
text-align:center;
margin:15px 0 40px;
color:#ccc;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#181028;
padding:25px;
border-radius:15px;
border:1px solid #2d1f46;
}

.card h2{
margin-bottom:10px;
color:#c084fc;
}

.card p{
margin-bottom:20px;
color:#ccc;
}

.btn{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#a855f7;
color:white;
cursor:pointer;
font-weight:bold;
}

.tool-area{
display:none;
margin-top:30px;
background:#181028;
padding:20px;
border-radius:15px;
}

.tool-area input{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:10px;
}

.result{
margin-top:15px;
background:#24153b;
padding:15px;
border-radius:10px;
max-height:400px;
overflow:auto;
line-height:1.8;
}

.footer{
text-align:center;
margin-top:50px;
color:#999;
}
</style>
</head>
<body>

<div class="container">

<div style="text-align:center;">
<a href="https://pay.mypaylink.in/?q=80OXaY"
target="_blank"
class="badge">
💰 Sponsored
</a>
</div>

<h1 class="logo">AWTags</h1>

<p class="subtitle">
Free SEO Tools For Content Creators
</p>

<div class="cards">

<div class="card">
<h2>🔑 Keyword Generator</h2>
<p>Generate 50+ keywords</p>
<button class="btn" onclick="showTool()">
Generate Keywords
</button>
</div>

</div>

<div id="tool-area" class="tool-area"></div>

<div class="footer">
© 2026 AWTags
</div>

</div>

<script>

function showTool(){

document.getElementById("tool-area").style.display="block";

document.getElementById("tool-area").innerHTML=`

<h2>🔑 Keyword Generator</h2>

<input
id="keyword"
placeholder="Enter keyword">

<button
class="btn"
onclick="generateKeywords()">
Generate
</button>

<div
id="result"
class="result">
</div>

`;

}

function generateKeywords(){

let k =
document.getElementById("keyword")
.value.trim();

if(!k){
alert("Enter keyword");
return;
}

let keywords = [

k,
"best "+k,
"top "+k,
"free "+k,
"latest "+k,
"new "+k,
"ultimate "+k,
"complete "+k,
"advanced "+k,
"easy "+k,

k+" tutorial",
k+" guide",
k+" tips",
k+" tricks",
k+" hacks",
k+" course",
k+" training",
k+" basics",
k+" masterclass",
k+" examples",

k+" shorts",
k+" reels",
k+" reel",
k+" video",
k+" viral",
k+" trending",
k+" highlights",
k+" compilation",
k+" status",
k+" clips",

k+" youtube",
k+" instagram",
k+" facebook",
k+" twitter",
k+" social media",

k+" seo",
k+" keyword",
k+" marketing",
k+" content",
k+" strategy",

k+" 2026",
k+" 2027",
k+" update",

"how to "+k,
"what is "+k,
"why "+k,
"learn "+k,

k+" for beginners",
k+" for creators",

"best "+k+" tools",
"best "+k+" apps",
"best "+k+" software",

k+" ideas",
k+" template",
k+" checklist",
k+" secrets"

];

document.getElementById("result").innerHTML =
keywords.map(x => "• " + x).join("<br>");

}

</script>

</body>
</html>
