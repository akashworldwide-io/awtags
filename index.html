<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWTags</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div style="text-align:center; margin-bottom:20px;">
<a href="https://pay.mypaylink.in/?q=80OXaY"
target="_blank"
class="badge sponsor-badge">
💰 Sponsored
</a>
</div>

<h1 class="logo">AWTags</h1>

<p class="subtitle">
Free SEO Tools for Content Creators
</p>

<div class="cards">

<div class="card">
<h2>🏷️ Tag Generator</h2>
<p>Generate optimized YouTube tags.</p>
<button class="btn" onclick="showTool('tags')">
Generate Tags
</button>
</div>

<div class="card">
<h2>🔥 Hashtag Generator</h2>
<p>Create trending hashtags.</p>
<button class="btn" onclick="showTool('hashtags')">
Generate Hashtags
</button>
</div>

<div class="card">
<h2>🎯 Title Generator</h2>
<p>Create engaging titles.</p>
<button class="btn" onclick="showTool('titles')">
Generate Titles
</button>
</div>

<div class="card">
<h2>🔑 Keyword Generator</h2>
<p>Generate 50+ SEO keywords.</p>
<button class="btn" onclick="showTool('keywords')">
Generate Keywords
</button>
</div>

</div>

<div id="tool-area" class="tool-area"></div>

<div class="footer">
© 2026 AWTags • All Rights Reserved
</div>

</div>

<script>

function showTool(tool){

const area = document.getElementById("tool-area");
area.style.display = "block";

if(tool==="tags"){
area.innerHTML = `
<h2>🏷️ Tag Generator</h2>

<input id="keyword" placeholder="Enter keyword">

<button class="btn" onclick="generateTags()">
Generate Tags
</button>

<div id="result" class="result"></div>
`;
}

if(tool==="hashtags"){
area.innerHTML = `
<h2>🔥 Hashtag Generator</h2>

<input id="keyword" placeholder="Enter keyword">

<button class="btn" onclick="generateHashtags()">
Generate Hashtags
</button>

<div id="result" class="result"></div>
`;
}

if(tool==="titles"){
area.innerHTML = `
<h2>🎯 Title Generator</h2>

<input id="keyword" placeholder="Enter keyword">

<button class="btn" onclick="generateTitles()">
Generate Titles
</button>

<div id="result" class="result"></div>
`;
}

if(tool==="keywords"){
area.innerHTML = `
<h2>🔑 Keyword Generator</h2>

<input id="keyword" placeholder="Enter keyword">

<button class="btn" onclick="generateKeywords()">
Generate Keywords
</button>

<div id="result" class="result"></div>
`;
}

window.scrollTo({
top:document.body.scrollHeight,
behavior:'smooth'
});

}

function generateTags(){

let k = document.getElementById("keyword").value.trim();

if(!k){
alert("Enter keyword");
return;
}

document.getElementById("result").innerHTML = `
• ${k}<br>
• ${k} shorts<br>
• ${k} viral<br>
• ${k} trending<br>
• best ${k}<br>
• ${k} youtube<br>
• ${k} tutorial<br>
• ${k} tips
`;

}

function generateHashtags(){

let k = document.getElementById("keyword").value.trim();

if(!k){
alert("Enter keyword");
return;
}

k = k.replaceAll(" ","");

document.getElementById("result").innerHTML = `
#${k}<br>
#viral<br>
#trending<br>
#shorts<br>
#youtube<br>
#creator<br>
#explore<br>
#content
`;

}

function generateTitles(){

let k = document.getElementById("keyword").value.trim();

if(!k){
alert("Enter keyword");
return;
}

document.getElementById("result").innerHTML = `
• Best ${k} Tips<br>
• Top 10 ${k} Secrets<br>
• Amazing ${k} Guide<br>
• ${k} Tutorial For Beginners<br>
• Ultimate ${k} Strategy
`;

}

function generateKeywords(){

let k = document.getElementById("keyword").value.trim();

if(!k){
alert("Enter keyword");
return;
}

let keywords = [
k,
"best "+k,
"top "+k,
"free "+k,
"latest "+k,
"new "+k,
"ultimate "+k,
"complete "+k,
"advanced "+k,
"easy "+k,
k+" tutorial",
k+" guide",
k+" tips",
k+" tricks",
k+" hacks",
k+" course",
k+" training",
k+" basics",
k+" masterclass",
k+" examples",
k+" shorts",
k+" reels",
k+" reel",
k+" video",
k+" viral",
k+" trending",
k+" highlights",
k+" compilation",
k+" status",
k+" clips",
k+" youtube",
k+" instagram",
k+" facebook",
k+" twitter",
k+" social media",
k+" seo",
k+" keyword",
k+" marketing",
k+" content",
k+" strategy",
k+" 2026",
k+" 2027",
k+" update",
"how to "+k,
"what is "+k,
"why "+k,
"learn "+k,
k+" for beginners",
k+" for students",
k+" for creators",
"best "+k+" tools",
"best "+k+" apps",
"best "+k+" software",
k+" ideas",
k+" template",
k+" checklist",
k+" secrets"
];

document.getElementById("result").innerHTML =
keywords.map(x => "• " + x).join("<br>");

}

</script>

</body>
</html>
